<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Ant Colony</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">
  <div id="canvas-container">
    <canvas id="canvas" width="1000" height="800"></canvas>
  </div>
  <aside id="panel">
    <h1>Ant Colony</h1>

    <section>
      <h2>Tools</h2>
      <div class="tool-grid">
        <button data-tool="nest">Nest</button>
        <button data-tool="food">Food</button>
        <button data-tool="obstacle">Wall</button>
        <button data-tool="eraser">Erase</button>
      </div>
      <p class="hint">Click to place. Drag walls/eraser to paint.</p>
    </section>

    <section>
      <h2>Simulation</h2>
      <div class="row">
        <button id="play-pause">Pause</button>
        <button id="reset">Reset</button>
      </div>
      <label>Speed <span id="speed-label">1×</span>
        <input type="range" id="speed">
      </label>
      <label>Max ants <span id="ants-label">300</span>
        <input type="range" id="ants" min="0" max="800" step="20" value="300">
      </label>
    </section>

    <section>
      <h2>Display</h2>
      <label class="check">
        <input type="checkbox" id="show-pheromones" checked>
        Show pheromones
      </label>
    </section>

    <section>
      <h2>Stats</h2>
      <div class="stat"><span>Food collected</span><b id="stat-food">0</b></div>
      <div class="stat"><span>Active ants</span><b id="stat-ants">0</b></div>
      <div class="stat"><span>Ants died</span><b id="stat-died">0</b></div>
      <div class="stat"><span>Ticks</span><b id="stat-ticks">0</b></div>
    </section>

    <p class="footer">Phase 1 sandbox.<br>
      Pheromones: blue = home, red = food.<br>
      Ants: pink = scouts, gray = workers, yellow = carrying food.</p>
  </aside>
</div>
<!-- Plain scripts in dependency order so this Just Works from file:// too.
     Each file attaches its exports to the window.AntSim namespace. -->
<script src="js/pheromone.js"></script>
<script src="js/world.js"></script>
<script src="js/ant.js"></script>
<script src="js/sim.js"></script>
<script src="js/render.js"></script>
<script src="js/input.js"></script>
<script src="js/ui.js"></script>
<script src="js/storage.js"></script>
<script src="js/main.js"></script>
</body>
</html>
